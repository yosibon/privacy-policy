    <h1>上級者向け設定（キオスク化 / adb）</h1>

    <p>このページでは、端末をキオスクモードに設定するための adb コマンドを紹介します。</p>

    <h2>例：キオスク化コマンド</h2>
    <pre>
adb shell dpm set-device-owner com.example.app/.MyAdminReceiver
    </pre>

    <p>※ 実際のコマンドは後で正確なものに差し替えます。</p>
